version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: prime_ei_postgres
    environment:
      POSTGRES_USER: prime_ei
      POSTGRES_PASSWORD: prime_ei_dev_password
      POSTGRES_DB: prime_enterprise_intelligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prime_ei"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: prime_ei_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_data:
